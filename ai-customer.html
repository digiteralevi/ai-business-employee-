<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Us</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f18;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#13131f;width:100%}

/* ERROR STATE */
.error-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
.error-box{background:#1a1a2e;border:1px solid #2a2a3a;border-radius:16px;padding:2rem}
.error-box i{font-size:40px;color:#FF6B6B;display:block;margin-bottom:1rem}
.error-box h2{font-size:16px;color:#fff;margin-bottom:.5rem}
.error-box p{font-size:13px;color:#666;line-height:1.6}

/* LEAD SCREEN */
.lead-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;background:#0f0f18}
.lead-box{background:#13131f;border:1px solid #2a2a3a;border-radius:16px;padding:1.75rem;width:100%}
.lead-avatar{width:60px;height:60px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.lead-avatar i{color:#fff;font-size:28px}
.lead-biz{font-size:11px;font-weight:600;color:#5DCAA5;text-align:center;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.375rem}
.lead-title{font-size:20px;font-weight:700;color:#fff;text-align:center;margin-bottom:.5rem}
.lead-sub{font-size:13px;color:#777;text-align:center;margin-bottom:1.5rem;line-height:1.6}
.lead-inp{width:100%;padding:10px 12px;font-size:14px;border:1px solid #2a2a3a;border-radius:8px;background:#1a1a2e;color:#f0f0f0;font-family:inherit;margin-bottom:.75rem;transition:border-color .15s}
.lead-inp:focus{outline:none;border-color:#1D9E75}
.lead-inp::placeholder{color:#3a3a4a}
.lead-btn{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.lead-btn:hover{background:#179464}
.lead-skip{text-align:center;margin-top:.875rem}
.lead-skip button{background:none;border:none;color:#444;font-size:12px;cursor:pointer;font-family:inherit}
.lead-skip button:hover{color:#777}

/* CHAT */
.chat-wrap{flex:1;display:none;flex-direction:column}
.topbar{padding:.875rem 1.5rem;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;gap:10px;background:#13131f}
.ai-av{width:38px;height:38px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-av i{color:#fff;font-size:17px}
.ai-nm{font-size:14px;font-weight:600;color:#fff}
.ai-st{font-size:11px;color:#5DCAA5;display:flex;align-items:center;gap:4px;margin-top:1px}
.dot{width:6px;height:6px;border-radius:50%;background:#5DCAA5;animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.biz-nm{font-size:10px;color:#444;margin-top:1px}

.messages{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:12px;background:#0f0f18}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
.msg{display:flex;gap:8px;max-width:88%;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.bubble{padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.ai .bubble{background:#1e1e30;color:#e8e8f0;border:1px solid #2a2a3a;border-bottom-left-radius:3px}
.msg.user .bubble{background:#1D9E75;color:#fff;border-bottom-right-radius:3px}
.mav{width:28px;height:28px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.mav i{color:#fff;font-size:12px}
.mav.u{background:#1e1e30;border:1px solid #2a2a3a}
.mav.u i{color:#666}
.mt{font-size:10px;color:#333;margin-top:3px}
.msg.user .mt{text-align:right}
.tw{display:flex;gap:8px}
.tbub{padding:12px 14px;background:#1e1e30;border:1px solid #2a2a3a;border-radius:14px;border-bottom-left-radius:3px;display:flex;gap:5px;align-items:center}
.tbub span{width:7px;height:7px;border-radius:50%;background:#444;animation:bop .9s infinite}
.tbub span:nth-child(2){animation-delay:.15s}
.tbub span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.chips{padding:.5rem 1.5rem;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;background:#0f0f18;border-top:1px solid #1a1a2e}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 11px;border:1px solid #2a2a3a;border-radius:20px;font-size:12px;color:#777;white-space:nowrap;cursor:pointer;background:#1a1a2e;flex-shrink:0;font-family:inherit;transition:all .15s}
.chip:hover{border-color:#1D9E75;color:#5DCAA5}

.action-bar{padding:.5rem 1.5rem;border-top:1px solid #1a1a2e;display:flex;gap:6px;background:#13131f}
.act-btn{flex:1;padding:8px 10px;border:1px solid #2a2a3a;border-radius:8px;background:#1a1a2e;color:#bbb;font-size:12.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s;text-decoration:none}
.act-btn:hover{border-color:#1D9E75;color:#5DCAA5}
.act-btn.pay{border-color:rgba(245,166,35,.3);color:#F5A623;background:rgba(245,166,35,.05)}
.act-btn.pay:hover{border-color:#F5A623}
.act-btn i{font-size:14px}

.inp-row{padding:.875rem 1rem;border-top:1px solid #2a2a3a;display:flex;gap:8px;align-items:flex-end;background:#13131f}
.cinp{flex:1;padding:10px 13px;border:1px solid #2a2a3a;border-radius:20px;font-size:13.5px;resize:none;background:#1a1a2e;color:#f0f0f0;max-height:100px;line-height:1.4;font-family:inherit;transition:border-color .15s}
.cinp:focus{outline:none;border-color:#1D9E75}
.cinp::placeholder{color:#3a3a4a}
.sbtn{width:38px;height:38px;border-radius:50%;background:#1D9E75;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn:hover{background:#179464}
.sbtn i{color:#fff;font-size:17px}
.sbtn:disabled{opacity:.3;cursor:not-allowed}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:center;justify-content:center;padding:1.25rem;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#13131f;border:1px solid #2a2a3a;border-radius:14px;width:100%;max-width:380px;overflow:hidden;transform:translateY(14px);transition:transform .2s}
.modal-overlay.show .modal{transform:translateY(0)}
.mhdr{padding:.875rem 1.1rem;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;gap:9px}
.mhdr i{font-size:18px;color:#5DCAA5}
.mhdr h3{font-size:14px;font-weight:600;color:#fff}
.mcls{margin-left:auto;width:26px;height:26px;border-radius:6px;background:#1a1a2e;border:1px solid #2a2a3a;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#777}
.mcls i{font-size:15px}
.mbody{padding:1.1rem;max-height:55vh;overflow-y:auto}
.mfield{margin-bottom:.75rem}
.mfield label{display:block;font-size:11.5px;font-weight:500;color:#999;margin-bottom:3px}
.mfield input,.mfield select,.mfield textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid #2a2a3a;border-radius:7px;background:#1a1a2e;color:#f0f0f0;font-family:inherit;transition:border-color .15s}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:#1D9E75}
.mfield input::placeholder,.mfield textarea::placeholder{color:#3a3a4a}
.mfield select option{background:#1a1a2e}
.mfield textarea{height:56px;resize:none;line-height:1.4}
.mfooter{padding:.875rem 1.1rem;border-top:1px solid #2a2a3a;display:flex;gap:7px}
.mbtn{flex:1;padding:9px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.mbtn.cancel{background:#1a1a2e;color:#777;border:1px solid #2a2a3a}
.mbtn.submit{background:#1D9E75;color:#fff}
.mbtn.submit:hover{background:#179464}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Error state - shown if no config -->
  <div class="error-screen" id="error-screen" style="display:none">
    <div class="error-box">
      <i class="ti ti-alert-circle"></i>
      <h2>Invalid Link</h2>
      <p>Ang link na ito ay hindi valid o expired na.<br>Makipag-ugnayan sa business para sa tamang link.</p>
    </div>
  </div>

  <!-- Lead capture -->
  <div class="lead-wrap" id="lead-wrap" style="display:none">
    <div class="lead-box">
      <div class="lead-avatar"><i class="ti ti-robot"></i></div>
      <div class="lead-biz" id="lead-biz">Business</div>
      <div class="lead-title" id="lead-title">Kamusta! 👋</div>
      <div class="lead-sub" id="lead-sub">Bago tayo mag-usap, pwede ko bang malaman ang iyong pangalan at number?</div>
      <input class="lead-inp" id="lead-name" placeholder="Pangalan mo">
      <input class="lead-inp" id="lead-number" type="tel" placeholder="Contact number (09XXXXXXXXX)">
      <button class="lead-btn" id="lead-btn" onclick="submitLead()">Magsimula na! →</button>
      <div class="lead-skip" id="lead-skip" style="display:none">
        <button onclick="skipLead()">Skip — go straight to chat</button>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-wrap" id="chat-wrap">
    <div class="topbar">
      <div class="ai-av"><i class="ti ti-robot"></i></div>
      <div>
        <div class="ai-nm" id="ai-nm">AI Assistant</div>
        <div class="ai-st"><span class="dot"></span> Online now</div>
        <div class="biz-nm" id="biz-nm"></div>
      </div>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="chips" id="chips"></div>
    <div class="action-bar" id="act-bar" style="display:none"></div>
    <div class="inp-row">
      <textarea class="cinp" id="cinp" rows="1" placeholder="Type your message..." onkeydown="onKey(event)" oninput="rsz(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="sendMsg()"><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="book-modal">
  <div class="modal">
    <div class="mhdr"><i class="ti ti-calendar-plus"></i><h3>Book Appointment</h3><button class="mcls" onclick="closeMod('book-modal')"><i class="ti ti-x"></i></button></div>
    <div class="mbody">
      <div class="mfield"><label>Full name</label><input id="b-name" placeholder="Your name"></div>
      <div class="mfield"><label>Contact number</label><input id="b-num" type="tel" placeholder="09XXXXXXXXX"></div>
      <div class="mfield"><label>Service</label><select id="b-svc"><option value="">Select service...</option></select></div>
      <div class="mfield"><label>Date</label><input id="b-date" type="date"></div>
      <div class="mfield"><label>Time</label><input id="b-time" type="time"></div>
      <div class="mfield"><label>Notes (optional)</label><textarea id="b-notes" placeholder="Special requests?"></textarea></div>
    </div>
    <div class="mfooter">
      <button class="mbtn cancel" onclick="closeMod('book-modal')">Cancel</button>
      <button class="mbtn submit" onclick="submitBooking()">Confirm Booking</button>
    </div>
  </div>
</div>

<script>
var BIZ = null;
var HISTORY = [];
var LEAD = {name:'', number:''};
var BUSY = false;

// Load config from URL
window.onload = function() {
  var params = new URLSearchParams(window.location.search);
  var encoded = params.get('c');
  var keyParam = params.get('k');
  if(!encoded) { showError(); return; }
  try {
    // Try base64 decode first (new format)
    var jsonStr;
    try {
      jsonStr = decodeURIComponent(escape(atob(encoded)));
    } catch(e2) {
      // Fallback: try old encodeURIComponent format
      jsonStr = decodeURIComponent(encoded);
    }
    BIZ = JSON.parse(jsonStr);
    // Attach key from separate param
    if(keyParam) BIZ.key = decodeURIComponent(keyParam);
    if(!BIZ.name || !BIZ.key) { showError(); return; }
    initApp();
  } catch(e) {
    showError();
  }
};

function showError() {
  document.getElementById('error-screen').style.display = 'flex';
}

function initApp() {
  // Set page title
  document.title = 'Chat with ' + BIZ.name;

  if(BIZ.leadMode === 'off') {
    LEAD = {name:'Guest', number:''};
    startChat();
  } else {
    showLeadScreen();
  }
}

function showLeadScreen() {
  var isEng = BIZ.lang === 'english';
  document.getElementById('lead-biz').textContent = BIZ.name;
  document.getElementById('lead-title').textContent = isEng ? 'Hello there! 👋' : 'Kamusta! 👋';
  document.getElementById('lead-sub').textContent = isEng
    ? 'Before we chat, may I get your name and contact number?'
    : 'Bago tayo mag-usap, pwede ko bang malaman ang iyong pangalan at number?';
  document.getElementById('lead-btn').textContent = isEng ? 'Start chatting! →' : 'Magsimula na! →';
  document.getElementById('lead-skip').style.display = BIZ.leadMode === 'optional' ? 'block' : 'none';
  document.getElementById('lead-wrap').style.display = 'flex';
}

function submitLead() {
  var n = document.getElementById('lead-name').value.trim();
  if(!n) { alert('Ilagay mo ang iyong pangalan!'); return; }
  LEAD = {name:n, number:document.getElementById('lead-number').value.trim()};
  document.getElementById('lead-wrap').style.display = 'none';
  startChat();
}

function skipLead() {
  LEAD = {name:'Guest', number:''};
  document.getElementById('lead-wrap').style.display = 'none';
  startChat();
}

function startChat() {
  document.getElementById('chat-wrap').style.display = 'flex';
  document.getElementById('ai-nm').textContent = BIZ.emp + ' · ' + BIZ.name;
  document.getElementById('biz-nm').textContent = LEAD.name && LEAD.name !== 'Guest' ? '👤 ' + LEAD.name : '';
  buildChips();
  buildActionBar();
  sendGreeting();
}

function buildChips() {
  var qs = BIZ.lang === 'english'
    ? ['How much?','Are you open?','Can I book?','What services?','Where are you?']
    : ['Magkano po?','Open na kayo?','Pwede mag-book?','Anong services?','Saan kayo?'];
  var c = document.getElementById('chips'); c.innerHTML = '';
  qs.forEach(function(q){
    var el = document.createElement('button'); el.className = 'chip'; el.textContent = q;
    el.onclick = function(){ document.getElementById('cinp').value = q; sendMsg(); };
    c.appendChild(el);
  });
}

function buildActionBar() {
  var bar = document.getElementById('act-bar'); bar.innerHTML = '';
  var feats = BIZ.feats || {};
  if(feats.booking) {
    var b = document.createElement('button'); b.className = 'act-btn';
    b.innerHTML = '<i class="ti ti-calendar-plus"></i> Book Appointment';
    b.onclick = openBooking; bar.appendChild(b);
    populateServices();
  }
  if(BIZ.payLink) {
    var a = document.createElement('a'); a.className = 'act-btn pay';
    a.innerHTML = '<i class="ti ti-credit-card"></i> Pay Now';
    a.href = BIZ.payLink; a.target = '_blank'; bar.appendChild(a);
  }
  bar.style.display = bar.children.length ? 'flex' : 'none';
}

function populateServices() {
  var sel = document.getElementById('b-svc');
  sel.innerHTML = '<option value="">Select service...</option>';
  (BIZ.services || '').split('\n').forEach(function(line){
    line = line.trim(); if(!line) return;
    var opt = document.createElement('option'); opt.value = line; opt.textContent = line; sel.appendChild(opt);
  });
}

function getLangRule() {
  if(BIZ.lang === 'english') return 'Reply in English only. Natural and conversational.';
  if(BIZ.lang === 'custom') return BIZ.customLang;
  return 'Reply in modern Taglish — natural mix ng Filipino at English tulad ng paraan ng pag-text ng mga young Filipinos. Conversational, relatable, hindi robotic.';
}

function sysPrompt() {
  var feats = BIZ.feats || {};
  var cust = LEAD.name && LEAD.name !== 'Guest' ? '\nCustomer: ' + LEAD.name + (LEAD.number ? ' (' + LEAD.number + ')' : '') : '';
  return 'You are ' + BIZ.emp + ', a trained sales assistant for "' + BIZ.name + '"' + (BIZ.type ? ' (' + BIZ.type + ')' : '') + '.\n\nServices:\n' + BIZ.services + '\n\nFAQ:\n' + (BIZ.faqs || 'None.') + cust + '\n\nRules:\n- Tone: ' + (BIZ.tone || 'Friendly') + '\n- ' + getLangRule() + (feats.sales ? '\n- Recommend services naturally and persuasively' : '') + (feats.followup ? '\n- Always end with a warm follow-up question' : '') + (feats.emojis ? '\n- Use emojis naturally' : '\n- No emojis') + '\n- Never say you are an AI\n- State prices clearly\n- Keep replies max 3-4 sentences' + (LEAD.name && LEAD.name !== 'Guest' ? '\n- Call customer by name occasionally' : '') + (BIZ.payLink ? '\n- If ready to pay, tell them to click Pay Now button below.' : '');
}

function sendGreeting() {
  callAI([{role:'user', content:'Greet the customer' + (LEAD.name && LEAD.name !== 'Guest' ? ' named ' + LEAD.name : '') + ' warmly. Say your name and the business. Ask how you can help. Max 2 sentences.'}], true);
}

function sendMsg() {
  var inp = document.getElementById('cinp');
  var text = inp.value.trim();
  if(!text || BUSY) return;
  inp.value = ''; inp.style.height = '';
  addMsg('user', text);
  HISTORY.push({role:'user', content:text});
  callAI(HISTORY.slice(-12), false);
}

async function callAI(messages, isGreet) {
  BUSY = true; document.getElementById('sbtn').disabled = true;
  var t = addTyping();
  try {
    var res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + BIZ.key,
        'HTTP-Referer': window.location.origin,
        'X-Title': 'AIBizEmployee-Customer'
      },
      body: JSON.stringify({
        model: 'openrouter/auto',
        messages: [{role:'system', content:sysPrompt()}].concat(messages),
        max_tokens: 300,
        temperature: 0.85
      })
    });
    var json = await res.json(); t.remove();
    if(json.error) { addMsg('ai', '⚠️ ' + json.error.message); }
    else {
      var reply = (json.choices[0].message.content || '').trim();
      addMsg('ai', reply);
      HISTORY.push({role:'assistant', content:reply});
    }
  } catch(e) { t.remove(); addMsg('ai', '⚠️ Connection error. Please try again.'); }
  BUSY = false; document.getElementById('sbtn').disabled = false;
}

function addMsg(role, text) {
  var box = document.getElementById('msgs');
  var wrap = document.createElement('div'); wrap.className = 'msg ' + role;
  var av = document.createElement('div'); av.className = 'mav' + (role === 'user' ? ' u' : '');
  av.innerHTML = role === 'ai' ? '<i class="ti ti-robot"></i>' : '<i class="ti ti-user"></i>';
  var inner = document.createElement('div');
  var bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  var ts = document.createElement('div'); ts.className = 'mt';
  ts.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  inner.appendChild(bub); inner.appendChild(ts);
  wrap.appendChild(av); wrap.appendChild(inner);
  box.appendChild(wrap); box.scrollTop = box.scrollHeight;
}

function addTyping() {
  var box = document.getElementById('msgs');
  var w = document.createElement('div'); w.className = 'tw';
  var av = document.createElement('div'); av.className = 'mav'; av.innerHTML = '<i class="ti ti-robot"></i>';
  var b = document.createElement('div'); b.className = 'tbub'; b.innerHTML = '<span></span><span></span><span></span>';
  w.appendChild(av); w.appendChild(b); box.appendChild(w); box.scrollTop = box.scrollHeight; return w;
}

function openBooking() {
  if(LEAD.name && LEAD.name !== 'Guest') document.getElementById('b-name').value = LEAD.name;
  if(LEAD.number) document.getElementById('b-num').value = LEAD.number;
  document.getElementById('b-date').min = new Date().toISOString().split('T')[0];
  document.getElementById('book-modal').classList.add('show');
}

function submitBooking() {
  var name = document.getElementById('b-name').value.trim();
  var svc = document.getElementById('b-svc').value;
  var date = document.getElementById('b-date').value;
  var time = document.getElementById('b-time').value;
  var num = document.getElementById('b-num').value.trim();
  var notes = document.getElementById('b-notes').value.trim();
  if(!name || !svc || !date || !time) { alert('Please fill in name, service, date, and time.'); return; }
  closeMod('book-modal');
  addMsg('ai', '✅ Booking confirmed!\n\n📋 ' + name + '\n💆 ' + svc + '\n📅 ' + date + ' at ' + time + (notes ? '\n📝 ' + notes : '') + '\n\n' + (BIZ.lang === 'english' ? "We'll send a confirmation soon. Thank you!" : 'Magpapadala kami ng confirmation. Salamat!'));
}

function closeMod(id) { document.getElementById(id).classList.remove('show'); }
function onKey(e) { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function rsz(el) { el.style.height = ''; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
</script>
</body>
</html>
